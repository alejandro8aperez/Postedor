services:
  - type: web
    name: postedor
    plan: free
    region: oregon
    branch: main
    runtime: static
    buildCommand: echo "Static site - no build required"
    staticPublishPath: ./website
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
